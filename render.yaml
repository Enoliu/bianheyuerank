services:
  - type: web
    name: hot-contracts-api
    runtime: go
    buildCommand: |
      cd frontend && npm install && npm run build && cd ..
      mkdir -p backend/dist
      cp -r frontend/dist/* backend/dist/
      cd backend && go build -o ../server .
    startCommand: ./server
    envVars:
      - key: GIN_MODE
        value: release
    healthCheckPath: /
